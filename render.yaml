services:
  # 1. PostgreSQL Database Service
  - type: db
    name: prediction-db
    plan: free
    databaseName: test_prediction_db
    user: postgres

  # 2. FastAPI Backend Web Service
  - type: web
    name: prediction-backend
    plan: free
    env: docker
    dockerfilepath: backend/Dockerfile
    dockercontext: backend
    port: 8000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prediction-db
          property: connectionString
      - key: USE_SQLITE
        value: "false"
      - key: API_KEY
        value: aegis_prod_api_key_2026
      - key: ALLOWED_ORIGINS
        # Allow dev local hosts and user can append their vercel URL once created
        value: "http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000"
